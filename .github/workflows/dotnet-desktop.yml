name: Windows validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python test dependencies
        run: python -m pip install --disable-pip-version-check numpy Pillow torch
      - name: Restore
        run: dotnet restore .\Aimmy2.sln
      - name: Release build
        run: dotnet build .\Aimmy2.sln -c Release --no-restore
      - name: .NET tests
        run: dotnet test .\Aimmy2.sln -c Release --no-build
      - name: Python syntax
        run: python -m compileall -q training
      - name: Python tests
        run: python -m unittest discover -s training/tests -p "test_*.py" -v
      - name: Compile installer fixture
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $fixture = Join-Path $env:RUNNER_TEMP 'kingaim-installer-fixture'
          $publish = Join-Path $fixture 'publish'
          $bundle = Join-Path $fixture 'stable-bundle'
          New-Item -ItemType Directory -Force -Path $publish, $bundle | Out-Null
          Set-Content -LiteralPath (Join-Path $publish 'YmmiaV2.exe') -Value 'fixture application binary'
          Set-Content -LiteralPath (Join-Path $bundle 'model.onnx') -Value 'fixture ONNX payload'
          @{
            schema_version = '2'
            id = 'ci-fixture-stable-detector'
            version = '0.0.0-ci'
            architecture = 'fixture-detector'
            task = 'detect'
            output_schema = 'yolo-detect-v1'
            is_pose_model = $false
          } | ConvertTo-Json | Set-Content -LiteralPath (Join-Path $bundle 'manifest.json')
          $installerOutput = Join-Path $fixture 'installer-output'
          .\installer\Build-Installer.ps1 -StableModelDirectory $bundle -PublishDirectory $publish -OutputDirectory $installerOutput -SkipRedist
          if (-not (Test-Path (Join-Path $installerOutput 'KingAimSetup.exe'))) {
            throw 'Installer fixture compilation produced no executable.'
          }
      - name: Diff integrity
        shell: pwsh
        run: git diff --check
