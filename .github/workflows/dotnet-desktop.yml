name: Windows validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Restore
        run: dotnet restore .\Aimmy2.sln
      - name: Release build
        run: dotnet build .\Aimmy2.sln -c Release --no-restore
      - name: .NET tests
        run: dotnet test .\Aimmy2.sln -c Release --no-build
      - name: Python syntax
        run: python -m compileall -q training
      - name: Python tests
        run: python -m unittest discover -s training/tests -p "test_*.py" -v
      - name: Diff integrity
        shell: pwsh
        run: git diff --check
